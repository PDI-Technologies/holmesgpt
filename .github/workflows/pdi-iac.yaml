# OpenTofu IaC workflow for the PDI HolmesGPT infrastructure.
#
# On pull_request (infra/** changes):
#   - Runs `tofu plan` and posts the plan diff as a PR comment
#
# On push to main (infra/** changes):
#   - Runs `tofu apply` to converge infrastructure
#
# State management:
#   This workflow uses an S3 backend for remote state so that CI and local
#   development share the same state file.
#
#   One-time setup (run locally before first CI apply):
#     aws s3api create-bucket \
#       --bucket holmesgpt-tfstate-717423812395 \
#       --region us-east-1 \
#       --profile pdi-platform-dev
#     aws s3api put-bucket-versioning \
#       --bucket holmesgpt-tfstate-717423812395 \
#       --versioning-configuration Status=Enabled \
#       --profile pdi-platform-dev
#     aws s3api put-bucket-encryption \
#       --bucket holmesgpt-tfstate-717423812395 \
#       --server-side-encryption-configuration \
#         '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' \
#       --profile pdi-platform-dev
#
#   Then uncomment the S3 backend block in infra/main.tf and run:
#     cd infra && tofu init -migrate-state -var-file=envs/dev.tfvars
#
# Required GitHub Secrets:
#   PDI_AWS_ACCESS_KEY_ID          — IAM access key
#   PDI_AWS_SECRET_ACCESS_KEY      — IAM secret key
#   PDI_ANTHROPIC_API_KEY          — Anthropic API key for Holmes
#   PDI_MCP_ADO_API_KEY            — Azure DevOps PAT
#   PDI_MCP_ATLASSIAN_API_KEY      — Atlassian API key
#   PDI_MCP_SALESFORCE_API_KEY     — Salesforce API key

name: PDI — IaC

on:
  pull_request:
    paths:
      - 'infra/**'
      - '!infra/frontend/**'   # Frontend code changes don't affect IaC
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '!infra/frontend/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run (plan/apply)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: pdi-iac-${{ github.ref }}
  cancel-in-progress: false   # Never cancel IaC mid-flight

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: holmesgpt-tfstate-717423812395
  TF_STATE_KEY: holmesgpt/dev/terraform.tfstate
  TOFU_VERSION: "1.9.1"

jobs:
  iac:
    name: OpenTofu ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'apply' || (github.event.inputs.action == 'apply' && 'apply') || 'plan' }}
    runs-on: ubuntu-latest

    # Determine whether to apply or just plan
    env:
      RUN_APPLY: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.action == 'apply' }}

    permissions:
      contents: read
      pull-requests: write   # Needed to post plan comments on PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PDI_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PDI_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Install OpenTofu ─────────────────────────────────────────────────────

      - name: Install OpenTofu ${{ env.TOFU_VERSION }}
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | \
            sudo env OPENTOFU_VERSION=${{ env.TOFU_VERSION }} bash -s -- --install-method deb
          tofu version

      # ── Update kubeconfig (needed by helm/kubernetes providers) ─────────────

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name holmesgpt-dev \
            --region ${{ env.AWS_REGION }}

      # ── Configure backend ────────────────────────────────────────────────────
      # We inject the S3 backend config at init time using -backend-config flags.
      # This avoids hardcoding credentials in main.tf and works whether the
      # backend block in main.tf is "s3" or left as local (tofu will override).

      - name: OpenTofu init
        working-directory: infra
        run: |
          tofu init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure
        env:
          # Suppress profile lookup — credentials come from env vars set by configure-aws-credentials
          AWS_PROFILE: ""

      # ── Plan ─────────────────────────────────────────────────────────────────

      - name: OpenTofu plan
        id: plan
        working-directory: infra
        run: |
          tofu plan \
            -var-file=envs/dev.tfvars \
            -var="aws_profile=" \
            -var="anthropic_api_key=${{ secrets.PDI_ANTHROPIC_API_KEY }}" \
            -var="mcp_ado_api_key=${{ secrets.PDI_MCP_ADO_API_KEY }}" \
            -var="mcp_atlassian_api_key=${{ secrets.PDI_MCP_ATLASSIAN_API_KEY }}" \
            -var="mcp_salesforce_api_key=${{ secrets.PDI_MCP_SALESFORCE_API_KEY }}" \
            -out=tfplan \
            -no-color \
            2>&1 | tee /tmp/plan_output.txt

          # Capture exit code (0=no changes, 2=changes, 1=error)
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "plan_exit=$PLAN_EXIT" >> $GITHUB_OUTPUT

          if [ $PLAN_EXIT -eq 1 ]; then
            echo "❌ Plan failed"
            exit 1
          fi
        env:
          AWS_PROFILE: ""

      # ── Post plan as PR comment ──────────────────────────────────────────────

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');

            // Truncate if too long for a GitHub comment (65535 char limit)
            const MAX_LEN = 60000;
            const truncated = planOutput.length > MAX_LEN
              ? planOutput.slice(0, MAX_LEN) + '\n\n... (truncated — see workflow logs for full output)'
              : planOutput;

            const body = [
              `### 🏗️ OpenTofu Plan`,
              ``,
              `<details><summary>Show plan</summary>`,
              ``,
              `\`\`\`hcl`,
              truncated,
              `\`\`\``,
              `</details>`,
              ``,
              `> Plan generated from commit \`${context.sha.substring(0, 7)}\`. Apply will run automatically on merge to \`main\`.`,
            ].join('\n');

            // Delete previous IaC plan comments for this PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('OpenTofu Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      # ── Apply (main branch only) ─────────────────────────────────────────────

      - name: OpenTofu apply
        if: env.RUN_APPLY == 'true'
        working-directory: infra
        run: |
          tofu apply \
            -var-file=envs/dev.tfvars \
            -var="aws_profile=" \
            -var="anthropic_api_key=${{ secrets.PDI_ANTHROPIC_API_KEY }}" \
            -var="mcp_ado_api_key=${{ secrets.PDI_MCP_ADO_API_KEY }}" \
            -var="mcp_atlassian_api_key=${{ secrets.PDI_MCP_ATLASSIAN_API_KEY }}" \
            -var="mcp_salesforce_api_key=${{ secrets.PDI_MCP_SALESFORCE_API_KEY }}" \
            -auto-approve \
            -no-color \
            2>&1 | tee /tmp/apply_output.txt
        env:
          AWS_PROFILE: ""

      # ── Summary ─────────────────────────────────────────────────────────────

      - name: IaC summary
        if: always()
        run: |
          echo "## PDI IaC Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$RUN_APPLY" = "true" ]; then
            echo "### ✅ Apply completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -20 /tmp/apply_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📋 Plan only (merge to \`main\` to apply)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -30 /tmp/plan_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
