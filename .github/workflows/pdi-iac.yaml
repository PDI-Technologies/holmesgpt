# OpenTofu IaC workflow for the PDI HolmesGPT infrastructure.
#
# Environments:
#   dev  — <AWS_PROFILE>  (account <AWS_ACCOUNT_ID>)  — deploys on push to master
#   prod — pdi-platform-production                    — deploys on push to release/** or workflow_dispatch
#
# On pull_request (infra/** changes):
#   - Runs `tofu plan -refresh=false` for BOTH environments and posts the plan diff as a PR comment
#   - -refresh=false skips live state refresh so the plan works from GitHub Actions even when
#     the EKS API endpoint is private and unreachable from the runner
#
# On push to master (infra/** changes):
#   - Runs `tofu apply` for dev only
#
# On push to release/** (infra/** changes):
#   - Runs `tofu apply` for prod only
#
# State management:
#   This workflow uses an S3 backend for remote state so that CI and local
#   development share the same state file.
#
#   Dev state:  s3://<PDI_DEV_TF_STATE_BUCKET>/holmesgpt/dev/terraform.tfstate
#   Prod state: s3://<PDI_PROD_TF_STATE_BUCKET>/holmesgpt/prod/terraform.tfstate
#
#   One-time setup per environment (run locally before first CI apply):
#     aws s3api create-bucket \
#       --bucket holmesgpt-tfstate-<ACCOUNT_ID> \
#       --region us-east-1 \
#       --profile <PROFILE>
#     aws s3api put-bucket-versioning \
#       --bucket holmesgpt-tfstate-<ACCOUNT_ID> \
#       --versioning-configuration Status=Enabled \
#       --profile <PROFILE>
#     aws s3api put-bucket-encryption \
#       --bucket holmesgpt-tfstate-<ACCOUNT_ID> \
#       --server-side-encryption-configuration \
#         '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' \
#       --profile <PROFILE>
#
#   Then init with the appropriate backend config:
#     cd infra && tofu init -backend-config=envs/backend-dev.hcl   # dev
#     cd infra && tofu init -backend-config=envs/backend-prod.hcl  # prod
#
# Required GitHub Secrets (repository-level):
#   PDI_AWS_ACCESS_KEY_ID          — dev IAM access key
#   PDI_AWS_SECRET_ACCESS_KEY      — dev IAM secret key
#   PDI_ANTHROPIC_API_KEY          — Anthropic API key for Holmes (dev)
#   PDI_MCP_ADO_API_KEY            — Azure DevOps PAT (dev)
#   PDI_MCP_ATLASSIAN_API_KEY      — Atlassian API key (dev)
#   PDI_MCP_SALESFORCE_API_KEY     — Salesforce API key (dev)
#   PDI_DEV_TF_STATE_BUCKET        — S3 bucket name for dev state
#   PDI_DEV_HOLMES_UI_PASSWORD     — Holmes UI login password (dev)
#
# Required GitHub Secrets (prod environment — configure under Settings > Environments > prod):
#   PDI_PROD_AWS_ACCESS_KEY_ID     — prod IAM access key
#   PDI_PROD_AWS_SECRET_ACCESS_KEY — prod IAM secret key
#   PDI_PROD_ANTHROPIC_API_KEY     — Anthropic API key for Holmes (prod)
#   PDI_PROD_MCP_ADO_API_KEY       — Azure DevOps PAT (prod)
#   PDI_PROD_MCP_ATLASSIAN_API_KEY — Atlassian API key (prod)
#   PDI_PROD_MCP_SALESFORCE_API_KEY — Salesforce API key (prod)
#   PDI_PROD_TF_STATE_BUCKET       — S3 bucket name for prod state
#   PDI_PROD_ECR_REGISTRY          — ECR registry URL (<PROD_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com)
#   PDI_PROD_HOLMES_UI_PASSWORD    — Holmes UI login password (prod)

name: PDI — IaC

on:
  pull_request:
    paths:
      - 'infra/**'
      - '!infra/frontend/**'   # Frontend code changes don't affect IaC
    branches:
      - master
  push:
    branches:
      - master
      - 'release/**'
    paths:
      - 'infra/**'
      - '!infra/frontend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Action to run (plan/apply)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: pdi-iac-${{ github.ref }}
  cancel-in-progress: false   # Never cancel IaC mid-flight

env:
  AWS_REGION: us-east-1
  TOFU_VERSION: "1.9.1"

jobs:
  # ── Determine which environments to run ──────────────────────────────────────
  setup:
    name: Determine environments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Build environment matrix
        id: matrix
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          GH_INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual dispatch: run only the selected environment.
            # Validate input to prevent injection — only 'dev' or 'prod' are valid.
            case "$GH_INPUT_ENV" in
              dev|prod) ENV="$GH_INPUT_ENV" ;;
              *) echo "Invalid environment: $GH_INPUT_ENV" >&2; exit 1 ;;
            esac
            echo "matrix={\"include\":[{\"env\":\"$ENV\"}]}" >> $GITHUB_OUTPUT

          elif [ "$GH_EVENT_NAME" = "pull_request" ]; then
            # PRs: plan both environments
            echo 'matrix={"include":[{"env":"dev"},{"env":"prod"}]}' >> $GITHUB_OUTPUT

          elif [[ "$GH_REF" == refs/heads/release/* ]]; then
            # release/** branch push: apply prod only
            echo 'matrix={"include":[{"env":"prod"}]}' >> $GITHUB_OUTPUT

          else
            # push to master: apply dev only
            echo 'matrix={"include":[{"env":"dev"}]}' >> $GITHUB_OUTPUT
          fi

  # ── IaC plan/apply per environment ───────────────────────────────────────────
  iac:
    name: OpenTofu ${{ matrix.env }} — ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))) && 'apply' || (github.event.inputs.action == 'apply' && 'apply') || 'plan' }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    # Use GitHub Environment for prod (enables environment protection rules and separate secrets)
    environment: ${{ matrix.env == 'prod' && 'prod' || '' }}

    env:
      IS_PROD: ${{ matrix.env == 'prod' }}
      RUN_APPLY: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))) || github.event.inputs.action == 'apply' }}
      # Gate all AWS steps on credentials being present.
      # Without this, the job fails on Configure AWS credentials when secrets aren't set.
      HAVE_CREDS: ${{ (matrix.env == 'prod' && secrets.PDI_PROD_AWS_ACCESS_KEY_ID != '') || (matrix.env != 'prod' && secrets.PDI_AWS_ACCESS_KEY_ID != '') }}

    permissions:
      contents: read
      pull-requests: write   # Needed to post plan comments on PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Resolve per-environment config ───────────────────────────────────────

      - name: Set environment variables
        id: env-config
        run: |
          if [ "${{ matrix.env }}" = "prod" ]; then
            echo "AWS_ACCESS_KEY_ID=${{ secrets.PDI_PROD_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.PDI_PROD_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "TF_STATE_BUCKET=${{ secrets.PDI_PROD_TF_STATE_BUCKET }}" >> $GITHUB_ENV
            echo "TF_STATE_KEY=holmesgpt/prod/terraform.tfstate" >> $GITHUB_ENV
            echo "TF_VARFILE=envs/prod.tfvars" >> $GITHUB_ENV
            echo "ANTHROPIC_API_KEY=${{ secrets.PDI_PROD_ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
            echo "MCP_ADO_API_KEY=${{ secrets.PDI_PROD_MCP_ADO_API_KEY }}" >> $GITHUB_ENV
            echo "MCP_ATLASSIAN_API_KEY=${{ secrets.PDI_PROD_MCP_ATLASSIAN_API_KEY }}" >> $GITHUB_ENV
            echo "MCP_SALESFORCE_API_KEY=${{ secrets.PDI_PROD_MCP_SALESFORCE_API_KEY }}" >> $GITHUB_ENV
            echo "HOLMES_UI_PASSWORD=${{ secrets.PDI_PROD_HOLMES_UI_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "AWS_ACCESS_KEY_ID=${{ secrets.PDI_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.PDI_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "TF_STATE_BUCKET=${{ secrets.PDI_DEV_TF_STATE_BUCKET }}" >> $GITHUB_ENV
            echo "TF_STATE_KEY=holmesgpt/dev/terraform.tfstate" >> $GITHUB_ENV
            echo "TF_VARFILE=envs/dev.tfvars" >> $GITHUB_ENV
            echo "ANTHROPIC_API_KEY=${{ secrets.PDI_ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
            echo "MCP_ADO_API_KEY=${{ secrets.PDI_MCP_ADO_API_KEY }}" >> $GITHUB_ENV
            echo "MCP_ATLASSIAN_API_KEY=${{ secrets.PDI_MCP_ATLASSIAN_API_KEY }}" >> $GITHUB_ENV
            echo "MCP_SALESFORCE_API_KEY=${{ secrets.PDI_MCP_SALESFORCE_API_KEY }}" >> $GITHUB_ENV
            echo "HOLMES_UI_PASSWORD=${{ secrets.PDI_DEV_HOLMES_UI_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        if: env.HAVE_CREDS == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Install OpenTofu ──────────────────────────────────────────────────────

      - name: Install OpenTofu ${{ env.TOFU_VERSION }}
        if: env.HAVE_CREDS == 'true'
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | \
            sudo env OPENTOFU_VERSION=${{ env.TOFU_VERSION }} bash -s -- --install-method deb
          tofu version

      # ── Update kubeconfig (needed by helm/kubernetes providers) ──────────────

      - name: Update kubeconfig for EKS
        if: env.HAVE_CREDS == 'true'
        # Non-fatal: cluster may not exist yet on first plan (bootstrap scenario).
        # The helm/kubernetes providers only need kubeconfig for apply, not plan.
        continue-on-error: true
        run: |
          CLUSTER_NAME="holmesgpt-${{ matrix.env }}"
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region ${{ env.AWS_REGION }}

      # ── Configure backend ─────────────────────────────────────────────────────
      # We inject the S3 backend config at init time using -backend-config flags.

      - name: OpenTofu init
        if: env.HAVE_CREDS == 'true'
        working-directory: infra
        run: |
          # Unset AWS_PROFILE so the AWS CLI uses env-var credentials, not a named profile.
          # Setting AWS_PROFILE="" causes "config profile () could not be found" errors.
          unset AWS_PROFILE
          tofu init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      # ── Plan ──────────────────────────────────────────────────────────────────

      - name: OpenTofu plan (${{ matrix.env }})
        if: env.HAVE_CREDS == 'true'
        id: plan
        working-directory: infra
        run: |
          # Unset AWS_PROFILE so the AWS CLI uses env-var credentials, not a named profile.
          # Setting AWS_PROFILE="" causes "config profile () could not be found" errors.
          unset AWS_PROFILE
          tofu plan \
            -var-file="${{ env.TF_VARFILE }}" \
            -var="aws_profile=" \
            -var="anthropic_api_key=${{ env.ANTHROPIC_API_KEY }}" \
            -var="holmes_ui_password=${{ env.HOLMES_UI_PASSWORD }}" \
            -var="mcp_ado_api_key=${{ env.MCP_ADO_API_KEY }}" \
            -var="mcp_atlassian_api_key=${{ env.MCP_ATLASSIAN_API_KEY }}" \
            -var="mcp_salesforce_api_key=${{ env.MCP_SALESFORCE_API_KEY }}" \
            -refresh=false \
            -out=tfplan \
            -no-color \
            2>&1 | tee /tmp/plan_output.txt

          # Capture exit code (0=no changes, 2=changes, 1=error)
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "plan_exit=$PLAN_EXIT" >> $GITHUB_OUTPUT

          if [ $PLAN_EXIT -eq 1 ]; then
            echo "❌ Plan failed"
            exit 1
          fi
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      # ── Post plan as PR comment ───────────────────────────────────────────────

      - name: Post plan to PR (${{ matrix.env }})
        if: github.event_name == 'pull_request' && env.HAVE_CREDS == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.env }}';
            const planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');

            // Truncate if too long for a GitHub comment (65535 char limit)
            const MAX_LEN = 60000;
            const truncated = planOutput.length > MAX_LEN
              ? planOutput.slice(0, MAX_LEN) + '\n\n... (truncated — see workflow logs for full output)'
              : planOutput;

            const envEmoji = env === 'prod' ? '🚀' : '🔧';
            const body = [
              `### ${envEmoji} OpenTofu Plan — \`${env}\``,
              ``,
              `<details><summary>Show plan</summary>`,
              ``,
              `\`\`\`hcl`,
              truncated,
              `\`\`\``,
              `</details>`,
              ``,
              `> Plan generated from commit \`${context.sha.substring(0, 7)}\`. Apply will run automatically on merge to \`${ env === 'prod' ? 'release/**' : 'master' }\`.`,
            ].join('\n');

            // Delete previous IaC plan comments for this env/PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes(`OpenTofu Plan — \`${env}\``)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      # ── Apply ─────────────────────────────────────────────────────────────────

      - name: Verify AWS credentials before apply
        if: env.RUN_APPLY == 'true' && env.HAVE_CREDS == 'true'
        run: |
          # Unset AWS_PROFILE so the AWS CLI uses env-var credentials, not a named profile.
          # Setting AWS_PROFILE="" causes "config profile () could not be found" errors.
          unset AWS_PROFILE
          echo "=== AWS caller identity ==="
          aws sts get-caller-identity
          echo "=== aws eks get-token test ==="
          aws eks get-token --cluster-name "holmesgpt-${{ matrix.env }}" --region ${{ env.AWS_REGION }} | head -c 200
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: OpenTofu apply (${{ matrix.env }})
        if: env.RUN_APPLY == 'true' && env.HAVE_CREDS == 'true'
        working-directory: infra
        run: |
          # Unset AWS_PROFILE so the AWS CLI uses env-var credentials, not a named profile.
          # Setting AWS_PROFILE="" causes "config profile () could not be found" errors.
          unset AWS_PROFILE
          tofu apply \
            -var-file="${{ env.TF_VARFILE }}" \
            -var="aws_profile=" \
            -var="anthropic_api_key=${{ env.ANTHROPIC_API_KEY }}" \
            -var="holmes_ui_password=${{ env.HOLMES_UI_PASSWORD }}" \
            -var="mcp_ado_api_key=${{ env.MCP_ADO_API_KEY }}" \
            -var="mcp_atlassian_api_key=${{ env.MCP_ATLASSIAN_API_KEY }}" \
            -var="mcp_salesforce_api_key=${{ env.MCP_SALESFORCE_API_KEY }}" \
            -auto-approve \
            -no-color \
            2>&1 | tee /tmp/apply_output.txt
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      # ── Summary ───────────────────────────────────────────────────────────────

      - name: IaC summary (${{ matrix.env }})
        if: always()
        run: |
          ENV="${{ matrix.env }}"
          echo "## PDI IaC Summary — \`$ENV\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$HAVE_CREDS" != "true" ]; then
            echo "### ⏭️ Skipped — AWS credentials not configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Set the required GitHub Secrets to enable IaC runs (see workflow header comments)." >> $GITHUB_STEP_SUMMARY
          elif [ "$RUN_APPLY" = "true" ]; then
            echo "### ✅ Apply completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -20 /tmp/apply_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            APPLY_BRANCH=$([ "$ENV" = "prod" ] && echo "release/**" || echo "master")
            echo "### 📋 Plan only (merge to \`$APPLY_BRANCH\` to apply)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -30 /tmp/plan_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
