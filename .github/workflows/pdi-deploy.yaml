# Deploy HolmesGPT to the PDI dev EKS cluster.
# Triggered automatically on every push to main (after pdi-build.yaml has pushed :latest).
# Also available as a manual workflow_dispatch for emergency re-deploys.
#
# What this does:
#   1. Builds and pushes the Docker image tagged :latest to ECR
#   2. Restarts the Holmes deployment so Kubernetes pulls the new image
#   3. Waits for the rollout to complete and verifies health endpoints

name: PDI — Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker build and just restart the pod (yes/no)'
        required: false
        default: 'no'

concurrency:
  group: pdi-deploy
  cancel-in-progress: false   # Never cancel a deploy mid-flight

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 717423812395.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: holmesgpt
  EKS_CLUSTER: holmesgpt-dev
  K8S_NAMESPACE: holmesgpt
  DEPLOYMENT_NAME: holmes-holmes

jobs:
  deploy:
    name: Build, push :latest and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PDI_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PDI_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Docker build & push ──────────────────────────────────────────────────

      - name: Set up Docker Buildx
        if: github.event.inputs.skip_build != 'yes'
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: github.event.inputs.skip_build != 'yes'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push :latest to ECR
        if: github.event.inputs.skip_build != 'yes'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:main-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ── Kubernetes rollout ───────────────────────────────────────────────────

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Restart deployment (force pull of :latest)
        run: |
          kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s

      # ── Health verification ──────────────────────────────────────────────────

      - name: Verify health endpoints
        run: |
          BASE_URL="https://holmesgpt.dev.platform.pditechnologies.com"

          echo "Waiting 15s for pod to become ready..."
          sleep 15

          echo "Checking /healthz..."
          HEALTH=$(curl -sf --retry 5 --retry-delay 5 "$BASE_URL/healthz" || echo '{"status":"unreachable"}')
          echo "  $HEALTH"

          echo "Checking /readyz..."
          READY=$(curl -sf --retry 5 --retry-delay 5 "$BASE_URL/readyz" || echo '{"status":"unreachable"}')
          echo "  $READY"

          if echo "$HEALTH" | grep -q '"healthy"' && echo "$READY" | grep -q '"ready"'; then
            echo "✅ Health checks passed"
          else
            echo "⚠️  Health check response unexpected — check pod logs"
            kubectl logs -n ${{ env.K8S_NAMESPACE }} \
              -l app.kubernetes.io/name=holmes \
              --tail=30 || true
          fi

      - name: Show pod status
        if: always()
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide

      # ── Summary ─────────────────────────────────────────────────────────────

      - name: Deployment summary
        run: |
          SHORT="${{ steps.sha.outputs.short }}"
          echo "## PDI Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`${{ env.EKS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`${{ env.K8S_NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` (\`${SHORT}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://holmesgpt.dev.platform.pditechnologies.com |" >> $GITHUB_STEP_SUMMARY
