# Deploy HolmesGPT to PDI EKS clusters.
#
# Environments:
#   dev  — triggered on push to main
#   prod — triggered on push to release/** (e.g., release/1.2.3)
#
# What this does:
#   1. Builds and pushes the Docker image to the environment's ECR registry
#   2. Restarts the Holmes deployment so Kubernetes pulls the new image
#   3. Waits for the rollout to complete and verifies health endpoints
#
# Required GitHub Secrets (repository-level, for dev):
#   PDI_AWS_ACCESS_KEY_ID          — dev IAM access key
#   PDI_AWS_SECRET_ACCESS_KEY      — dev IAM secret key
#   PDI_DEV_ECR_REGISTRY           — <DEV_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com
#   PDI_DEV_HEALTH_BASE_URL        — https://<DEV_APP_HOSTNAME>
#
# Required GitHub Secrets (prod environment — Settings > Environments > prod):
#   PDI_PROD_AWS_ACCESS_KEY_ID     — prod IAM access key
#   PDI_PROD_AWS_SECRET_ACCESS_KEY — prod IAM secret key
#   PDI_PROD_ECR_REGISTRY          — <PROD_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com
#   PDI_PROD_HEALTH_BASE_URL       — https://<PROD_APP_HOSTNAME>

name: PDI — Deploy

on:
  push:
    branches:
      - master
      - 'release/**'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      skip_build:
        description: 'Skip Docker build and just restart the pod (yes/no)'
        required: false
        default: 'no'

concurrency:
  group: pdi-deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a deploy mid-flight

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: holmesgpt
  K8S_NAMESPACE: holmesgpt
  DEPLOYMENT_NAME: holmes-holmes

jobs:
  deploy:
    name: Deploy to ${{ (github.ref == 'refs/heads/master' || github.event.inputs.environment == 'dev') && 'dev' || 'prod' }}
    runs-on: ubuntu-latest

    # Use GitHub Environment for prod (enables protection rules and separate secrets)
    environment: ${{ (startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'prod') && 'prod' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Resolve per-environment config ───────────────────────────────────────

      - name: Set environment variables
        id: env-config
        env:
          GH_REF: ${{ github.ref }}
          GH_INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          # Validate workflow_dispatch input to prevent injection
          if [ -n "$GH_INPUT_ENV" ]; then
            case "$GH_INPUT_ENV" in
              dev|prod) ;;
              *) echo "Invalid environment: $GH_INPUT_ENV" >&2; exit 1 ;;
            esac
          fi

          if [[ "$GH_REF" == refs/heads/release/* ]] || [[ "$GH_INPUT_ENV" == "prod" ]]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID=${{ secrets.PDI_PROD_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.PDI_PROD_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "ECR_REGISTRY=${{ secrets.PDI_PROD_ECR_REGISTRY }}" >> $GITHUB_ENV
            echo "EKS_CLUSTER=holmesgpt-prod" >> $GITHUB_ENV
            echo "HEALTH_BASE_URL=${{ secrets.PDI_PROD_HEALTH_BASE_URL }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "AWS_ACCESS_KEY_ID=${{ secrets.PDI_AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.PDI_AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
            echo "ECR_REGISTRY=${{ secrets.PDI_DEV_ECR_REGISTRY }}" >> $GITHUB_ENV
            echo "EKS_CLUSTER=holmesgpt-dev" >> $GITHUB_ENV
            echo "HEALTH_BASE_URL=${{ secrets.PDI_DEV_HEALTH_BASE_URL }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Docker build & push ───────────────────────────────────────────────────

      - name: Set up Docker Buildx
        if: github.event.inputs.skip_build != 'yes'
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: github.event.inputs.skip_build != 'yes'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push to ECR
        if: github.event.inputs.skip_build != 'yes'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.DEPLOY_ENV }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ── Kubernetes rollout ────────────────────────────────────────────────────

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Restart deployment (force pull of :latest)
        run: |
          kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s

      # ── Health verification ───────────────────────────────────────────────────

      - name: Verify health endpoints
        run: |
          BASE_URL="${{ env.HEALTH_BASE_URL }}"

          echo "Waiting 15s for pod to become ready..."
          sleep 15

          echo "Checking /healthz..."
          HEALTH=$(curl -sf --retry 5 --retry-delay 5 "$BASE_URL/healthz" || echo '{"status":"unreachable"}')
          echo "  $HEALTH"

          echo "Checking /readyz..."
          READY=$(curl -sf --retry 5 --retry-delay 5 "$BASE_URL/readyz" || echo '{"status":"unreachable"}')
          echo "  $READY"

          # Both /healthz and /readyz return {"status":"ok",...} when healthy
          if echo "$HEALTH" | grep -q '"ok"' && echo "$READY" | grep -q '"ok"'; then
            echo "✅ Health checks passed"
          else
            echo "⚠️  Health check response unexpected — check pod logs"
            kubectl logs -n ${{ env.K8S_NAMESPACE }} \
              -l app.kubernetes.io/name=holmes \
              --tail=30 || true
          fi

      - name: Show pod status
        if: always()
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide

      # ── Summary ──────────────────────────────────────────────────────────────

      - name: Deployment summary
        env:
          GH_SHA: ${{ github.sha }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          echo "## PDI Deployment Summary — \`$DEPLOY_ENV\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`$DEPLOY_ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`$EKS_CLUSTER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`$K8S_NAMESPACE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`$ECR_REGISTRY/$ECR_REPOSITORY:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$GH_SHA\` (\`$SHORT_SHA\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | $HEALTH_BASE_URL |" >> $GITHUB_STEP_SUMMARY
