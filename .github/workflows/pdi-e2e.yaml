# Post-deployment E2E smoke tests for HolmesGPT PDI (dev only).
#
# Triggers:
#   - After pdi-deploy.yaml completes on master — automatic post-deploy gate
#   - workflow_dispatch — manual trigger for dev
#
# Required GitHub Secrets:
#   PDI_DEV_HOLMES_UI_PASSWORD   — Holmes UI login password (dev)

name: PDI — E2E Tests

on:
  # Run automatically after Deploy completes on master (dev deploys)
  workflow_run:
    workflows: ['PDI — Deploy']
    types: [completed]
    branches:
      - master

  # Manual trigger — dev only
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full

concurrency:
  group: pdi-e2e-${{ github.ref }}
  cancel-in-progress: true   # Cancel stale E2E runs; they're read-only

jobs:
  e2e:
    name: E2E ${{ github.event.inputs.suite || 'smoke' }} — dev
    runs-on: ubuntu-latest

    # Only run if the triggering deploy succeeded (or manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      SUITE: ${{ github.event.inputs.suite || 'smoke' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set environment variables
        run: |
          echo "BASE_URL=https://holmesgpt.dev.platform.pditechnologies.com" >> $GITHUB_ENV
          echo "HOLMES_PASSWORD=${{ secrets.PDI_DEV_HOLMES_UI_PASSWORD }}" >> $GITHUB_ENV
          echo "HOLMES_USERNAME=admin" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        if: env.SUITE == 'smoke'
        working-directory: e2e
        run: npx playwright test --grep @smoke
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HOLMES_USERNAME: ${{ env.HOLMES_USERNAME }}
          HOLMES_PASSWORD: ${{ env.HOLMES_PASSWORD }}
          CI: true

      - name: Run full test suite
        if: env.SUITE == 'full'
        working-directory: e2e
        run: npx playwright test --grep @full
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HOLMES_USERNAME: ${{ env.HOLMES_USERNAME }}
          HOLMES_PASSWORD: ${{ env.HOLMES_PASSWORD }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev-${{ github.run_number }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dev-${{ github.run_number }}
          path: e2e/test-results/
          retention-days: 7

      - name: E2E summary
        if: always()
        run: |
          echo "## E2E Test Summary — \`dev\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Suite**: \`$SUITE\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: \`$BASE_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Download the Playwright HTML report from the workflow artifacts for detailed results." >> $GITHUB_STEP_SUMMARY
